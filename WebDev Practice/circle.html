<!DOCTYPE html>
<html>
<head>
<title>USING JS</title>
</head>
<body>

<canvas id="myCanvas" width="200" height="150"></canvas>

</body>
<script>
var c= document.getElementById("myCanvas");
var ctx= c.getContext("2d");
ctx.beginPath();
ctx.arc(95, 50, 40, 0, 2*Math.PI);
ctx.stroke();
</script>
</html>
