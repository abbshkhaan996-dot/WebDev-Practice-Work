<!DOCTYPE html>
<html>
<head>
<title>USING JS</title>
</head>
<body>

<canvas id="myCanvas" width="200" height="150"></canvas>

</body>
<script>
var c= document.getElementById("myCanvas");
var ctx= c.getContext("2d");
ctx.moveTo(0,0);
ctx.lineTo(200, 100);
ctx.stroke();
</script>
</html>
