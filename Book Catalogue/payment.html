<!DOCTYPE html>
<html>
<head>
  <title>Payment</title>
</head>
<body style="background-color:#eef6fa; font-family:Arial; text-align:center;">

  <h1 style="color:black; text-align:center;"><i><b>Payment</b></i></h1>
  <p style="color:lightgreen;">Complete your purchase below</p>
  <form>
    <h3 style="background-color:lightgreen; text-align:center;">Billing Information</h3>
    <label><b>Full Name</b> :</label><input type="text" required><br><br>

    <label><b>Email</b>     :</label><input type="email" required><br><br>

    <label><b>Address</b>   :</label><input type="text" required><br><br>

    <h3 style="background-color:lightgreen; text-align:center;">Payment Details</h3>
    <label><b>Card Number</b> :</label><input type="text" maxlength="16" placeholder="xxxx xxxx xxxx xxxx" required><br><br>

    <label><b>Expiry Date</b> :</label><input type="month" required><br><br>

    <label><b>Payment Method</b> :</label>
    <select required>
      <option value="">Select Method</option>
      <option value="credit">Credit Card</option>
      <option value="debit">Debit Card</option>
      <option value="paypal">PayPal</option>
    </select><br><br><br>
    <button type="submit" style="background-color:lightgreen">Confirm Payment</button>
  </form>
</body>
</html>
